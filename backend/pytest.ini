[pytest]
# Dossier(s) où pytest cherche les tests
testpaths = tests

# Affichage : verbeux, durées des 10 tests les plus lents (utile pour repérer
# un test SARIMA/IsolationForest trop lent avant qu'il ne ralentisse toute la CI)
addopts = -v --durations=10

# Marqueurs personnalisés (pour pouvoir filtrer : pytest -m "not slow")
markers =
    slow: tests plus lents (entraînement de modèles factices, etc.)
